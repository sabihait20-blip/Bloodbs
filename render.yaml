services:
  - type: web
    name: blood-donation-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/donors.db
    disk:
      name: db-data
      mountPath: /var/data
      sizeGB: 1
